name: Instagram Auto Poster - Google Sheets

# SCHEDULE PAUSED (2026-06-25): Instagram flagged the account for spam-like
# publishing behavior (error code 4 / subcode 2207051) after a debugging
# burst posted duplicate content rapidly. Quota itself is fine (0/100 used),
# but the trust/behavior restriction needs time + reduced activity to clear.
#
# To resume:
#   1. Wait at least 48-72 hours with NO posting attempts (manual or automatic)
#   2. Test with ONE manual post directly from the Instagram app to confirm
#      the account can post normally again
#   3. Uncomment the "schedule:" block below and push
#
# Manual runs are still possible via "Run workflow" button (workflow_dispatch)
# if you want to test the automation again once ready - just avoid spamming it.

on:
  # schedule:
  #   - cron: '0 3 * * *'
  #   - cron: '0 9 * * *'
  #   - cron: '30 15 * * *'
  workflow_dispatch:

jobs:
  post-to-instagram:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      - name: Install dependencies
        run: pip install requests==2.31.0

      - name: Run Instagram Auto Poster
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: python python/gsheet_poster.py
