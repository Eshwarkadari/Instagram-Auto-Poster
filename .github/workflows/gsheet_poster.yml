name: Instagram Auto Poster - Google Sheets

on:
  schedule:
    - cron: '30 2 * * *'    # 8:00 AM IST
    - cron: '30 7 * * *'    # 1:00 PM IST
    - cron: '30 13 * * *'   # 7:00 PM IST
  workflow_dispatch:

jobs:
  post-to-instagram:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      - name: Install dependencies
        run: pip install requests==2.31.0 Pillow==10.4.0

      - name: Run Instagram Auto Poster
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: python python/gsheet_poster.py
