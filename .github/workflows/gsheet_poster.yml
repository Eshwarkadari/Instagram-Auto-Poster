name: Instagram Auto Poster - Google Sheets

on:
  schedule:
    - cron: '0 3 * * *'
    - cron: '0 9 * * *'
    - cron: '30 15 * * *'
  workflow_dispatch:

jobs:
  post-to-instagram:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: SAFE TEST - call Apps Script directly (no Instagram posting)
        env:
          DEBUG_GH_TOKEN: ${{ secrets.DEBUG_GH_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          python3 -c "
          import requests, base64, os, time

          WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbwAmCT_oqhO3XAkkk2ywyXciNBzyZiUk7bJtKpf0VUkAbE96iVK8Xgf9HLD4vV0Eo11/exec'
          test_url = 'https://pin.it/2F07WgfCW'

          r = requests.get(WEBAPP_URL, params={'url': test_url}, timeout=30)
          result = 'STATUS=' + str(r.status_code) + chr(10) + 'BODY=' + r.text[:500]
          print(result)

          token = os.environ['DEBUG_GH_TOKEN']
          repo = os.environ['GITHUB_REPO']
          b64 = base64.b64encode(result.encode()).decode()
          sha = None
          rr = requests.get(f'https://api.github.com/repos/{repo}/contents/full_run_log.txt',
                            headers={'Authorization':'Bearer '+token,'Accept':'application/vnd.github+json'})
          if rr.status_code == 200:
              sha = rr.json().get('sha')
          payload = {'message':'safe test result ' + str(int(time.time())), 'content': b64}
          if sha: payload['sha'] = sha
          rr2 = requests.put(f'https://api.github.com/repos/{repo}/contents/full_run_log.txt',
                             headers={'Authorization':'Bearer '+token,'Accept':'application/vnd.github+json'},
                             json=payload)
          print('Push status:', rr2.status_code)
          "
